name: Cross-OS Testing Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    # 1. Định nghĩa môi trường chạy dựa trên ma trận
    runs-on: ${{ matrix.os }}

    # 2. Cấu hình Matrix Strategy
    strategy:
      fail-fast: false # Nếu 1 OS lỗi, vẫn tiếp tục chạy các OS khác để quan sát
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # Sửa lệnh test thành lệnh verify
      - name: Run Tests and Check Coverage
        run: mvn verify

      # Thêm bước Upload Artifact
      - name: Upload JaCoCo Report
        uses: actions/upload-artifact@v4
        if: always() # Quan trọng: Luôn upload report kể cả khi build fail (do chưa đạt 80%)
        with:
          name: jacoco-report-${{ matrix.os }} # Lưu tên file theo hệ điều hành
          path: target/site/jacoco/